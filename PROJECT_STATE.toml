[compatibility]
policy = "evidence-classed"
target_windows_band = "Windows 95/98/ME and Windows NT 4.0 through Windows 11"
baseline_contract = "C89, x86 PE32 .scr, ANSI Win32 host path, mandatory gdi"
public_claim_rule = "Use certified, binary-audited, buildable, targeted, experimental, unsupported, or retired status for OS and artifact claims. Only certified is an ordinary public support promise."
default_os_status = "targeted-until-runtime-evidence-exists"
binary_audit = "validation/captures/truth-proof-baseline/pe-audit-current.txt"

[proof_kernel]
status = "active"
milestone = "proof-kernel-v0"
contract = "contracts/proof_kernel_v0.md"
surface_contract = "contracts/surface_rgba8_v0.md"
canary_product = "nocturne"
canary_evidence = "validation/captures/proof-kernel-v0/nocturne/proof.json"
scope = [
  "generated catalog inventory",
  "private RGBA8 surface",
  "minimal software/reference renderer",
  "fixed-step headless canary host",
  "compiled Nocturne canary runner over the real product session and render functions",
  "sslab render, compare, and lifecycle commands",
  "canonical RGBA8 capture hash",
  "exact repeatability comparison",
  "Nocturne create/resize/step/render/destroy lifecycle evidence",
  "committed clean-source baseline provenance",
  "implementation source digests in the committed proof bundle",
  "non-vacuous artifact-profile PE audit JSON facts",
  "adapter proof receipt includes nonempty artifact-profile PE audit facts",
  "GitHub Actions proof-kernel compile, render, compare, lifecycle, and adapter receipt lanes",
]
non_goals = [
  "public API rewrite",
  "all-saver migration",
  "AIDE autonomous merge",
  "new compatibility certification",
]

[doctrine]
schema_version = 1
contract = "contracts/screensave_doctrine_v1.md"
short_form = "Portable meaning. Native delivery. Deterministic proof. Optional automation."
platform_rule = "Share mechanics. Preserve meaning."
semantic_rule = "One stable platform contract, many product-owned semantic cores, multiple shells."
aide_boundary = "AIDE governs bounded development activity around ScreenSave. ScreenSave governs the product."
visual_intent_rule = "VisualIntent is descriptive authoring intent only; product-specific schemas own executable meaning."

[catalog]
schema_version = 1
source = "catalog/products.toml"
artifact_profiles = "catalog/artifact_profiles.toml"
artifact_sets = "catalog/artifact_sets.toml"
proof_profiles = "catalog/proof_profiles.toml"
generator = "tools/cataloggen/cataloggen.py"
generated_inventory = "catalog/generated/products_inventory.json"
generated_sources = "catalog/generated/products_sources.mk"
generated_table = "catalog/generated/products_table.md"
policy = "reviewed TOML authority with committed deterministic generated outputs"

[project_adapter]
schema_version = 1
status = "active"
contract = "contracts/project_adapter_v0.md"
command = "tools/project_adapter/screensave_project.py"
capability_bindings = "tools/project_adapter/capability_bindings.json"
receipt_schemas = "tools/project_adapter/receipt_schemas.json"
artifact_profile_audit_roots = "tools/project_adapter/artifact_profile_audit_roots.json"
commands = ["status", "capabilities", "catalog", "validate", "render", "compare", "audit", "proof"]
output_root = "out/aide/screensave-project-adapter/invocations"
policy = "project-owned adapter for AIDE-compatible coordination; fixed capabilities, contained generated-output roots under out/aide, artifact-profile audit roots, typed refusals, and no source mutation, merge, release, compatibility certification, or artistic acceptance"

[queues]
