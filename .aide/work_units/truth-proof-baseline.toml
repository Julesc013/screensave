schema_version = 1
id = "SS-TRUTH-000"
title = "Truth and proof baseline"
status = "active"
owner = "repo"
mode = "aide-lite-operational"

[goal]
summary = "Keep current ScreenSave truth, compatibility evidence, artifact profiles, and validator entry points aligned before larger portability work begins."
non_goals = [
  "do not rewrite Plasma",
  "do not replace renderer contracts",
  "do not widen public compatibility claims",
  "do not make products depend on AIDE",
]

[inputs]
project_state = "PROJECT_STATE.toml"
version_manifest = "VERSION.toml"
product_catalog = "catalog/products.toml"
artifact_profiles = "catalog/artifact_profiles.toml"
aide_lite_lock = ".aide/aide_lite.lock.toml"
project_bridge_profile = ".aide/project_bridge_profile.toml"
project_adapter = "tools/project_adapter/screensave_project.py"
artifact_profile_audit_roots = "tools/project_adapter/artifact_profile_audit_roots.json"
historical_queues = ".codex/queues"

[required_checks]
state = "python tools\\scripts\\check_project_state.py --summary"
catalog = "python tools\\scripts\\check_catalog_profiles.py"
docs = "python tools\\scripts\\check_docs_basics.py"
build = "python tools\\scripts\\check_build_layout.py"
aide = "python tools\\scripts\\check_aide_pilot.py"
contracts = "python tools\\scripts\\check_contracts.py"
project_adapter = "python tools\\scripts\\check_project_adapter.py"
compiled_nocturne_runner = "python tools\\scripts\\check_compiled_nocturne_runner.py"
pe_audit = "python tools\\scripts\\audit_pe_artifacts.py --output validation\\captures\\truth-proof-baseline\\pe-audit-current.txt"

[exit_condition]
summary = "State, version, catalog, docs, build, AIDE pilot, project adapter, and compiled Nocturne checks pass; PE audit and bridge evidence record current facts honestly."
