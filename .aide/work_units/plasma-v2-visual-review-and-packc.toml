allowed_paths = [
  ".aide/work_units/plasma-v2-visual-review-and-packc.toml",
  "docs/roadmap/paw-e-plasma-v2-visual-review-packc-workbench.md",
  "validation/captures/plasma-v2/reference-preview/preview-state.json",
  "tools/aideops/screensave_aide.py",
]
forbidden_paths = [
  "products/savers/plasma/src",
  "catalog/proof_profiles.toml",
  "stable release state",
  "compatibility certification claims",
  "automatic worker admission",
]
expected_validators = [
  "py -3 tools/scripts/check_project_state.py --summary",
  "py -3 tools/scripts/check_plasma_v2_preview_gate.py",
  "py -3 tools/aideops/screensave_aide.py preflight --task SS-PLV2-E0 --objective \"Checkpoint Plasma v2 preview truth\"",
  "git diff --check",
]
baseline_refs = [
  "PROJECT_STATE.toml [plasma_v2.status=reference-preview]",
  "validation/captures/plasma-v2/preview-gate/gate-report.json",
]
claim_boundary = "Checkpoint only; no new review decision, pack feature, proof profile, or product runtime change."

