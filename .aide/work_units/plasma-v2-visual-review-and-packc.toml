schema_version = 1
id = "SS-PAW-E-000"
title = "Plasma v2 visual review, packc, and Workbench authoring"
status = "active"
owner = "repo"
mode = "aide-lite-operational"
required_source_revision = "783148ef2edcfc70954cea82fd73a1c10bf0e5ea"
roadmap = "docs/roadmap/paw-e-plasma-v2-visual-review-packc-workbench.md"

[goal]
summary = "Convert the Plasma v2 reference preview into a reviewed, pack-authored, Workbench-usable preview candidate without stable promotion."
claim_boundary = "PAW-E may record preview review, pack compilation, bounded VisualIntent resolution, proof qualification, and Workbench authoring support only; it must not imply stable release, compatibility certification, public SDK stability, or AIDE product authority."
non_goals = [
  "do not promote Plasma v2 to stable Core",
  "do not broaden compatibility certification",
  "do not admit runtime executable plugins",
  "do not start all-saver migration",
  "do not start macOS or Linux native host work",
  "do not add D3D12 or Vulkan",
  "do not freeze a public SDK",
  "do not admit automatic AIDE mutation",
  "do not admit automatic release promotion",
]

[aide_operator]
preflight = "py -3 tools/aideops/screensave_aide.py preflight --task <id> --objective <objective>"
postflight = "py -3 tools/aideops/screensave_aide.py postflight --task <id>"
receipt_root = "out/aide/operations"
provider_calls = false
model_calls = false
network_calls = false

[evidence]
portable_v2_gate = "accepted"
plasma_v2_status = "reference-preview"
active_profile = "plasma.v2.reference.preview"
packc = "preview"
workbench_author = "preview"
artistic_acceptance = "not-yet-reviewed"
release_promotion = "blocked"
aide_worker = "blocked"
capture_root = "validation/captures/plasma-v2"
claim_boundary = "Reference-preview review evidence remains separate from final artistic acceptance, stable release, compatibility certification, and AIDE evidence."

