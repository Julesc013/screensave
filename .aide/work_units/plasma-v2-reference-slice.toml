schema_version = 1
id = "SS-PAW-DX-000"
title = "Plasma v2 reference slice"
status = "active"
owner = "repo"
mode = "aide-lite-operational"
required_source_revision = "0bc521d"
roadmap = "docs/roadmap/plasma-v2-reference-slice.md"

[goal]
summary = "Build one bounded, proof-backed Plasma v2 reference preview slice over the accepted portable v2 seam."
claim_boundary = "Plasma v2 work may establish a preview reference profile only; it must not imply artistic acceptance, stable release promotion, compatibility certification, public SDK stability, or automatic AIDE worker authority."
non_goals = [
  "do not migrate all savers",
  "do not freeze a public SDK",
  "do not admit runtime executable plugins",
  "do not generate source code from VisualIntent",
  "do not admit an automatic AIDE worker",
  "do not merge or promote automatically",
  "do not broaden compatibility certification",
  "do not rewrite Manager",
  "do not start macOS or Linux host work",
  "do not implement premium, glyph, ribbon, or heightfield Plasma lanes",
]

[aide_operator]
preflight = "py -3 tools/aideops/screensave_aide.py preflight --task <id> --objective <objective>"
postflight = "py -3 tools/aideops/screensave_aide.py postflight --task <id>"
receipt_root = "out/aide/operations"
provider_calls = false
model_calls = false
network_calls = false

[evidence]
portable_v2_gate = "accepted"
portable_v2_contract = "contracts/portable_semantics_v2.md"
u09_authority = "products/savers/plasma/docs/u09-stable-recut.md"
default_preset = "plasma_lava"
default_theme = "plasma_lava"
minimum_kind = "gdi"
preferred_kind = "gl11"
quality_class = "safe"
stable_output = "raster/native_raster"
stable_presentation = "flat"
capture_root = "validation/captures/plasma-v2"
claim_boundary = "Plasma v2 evidence is preview-slice evidence only until later human visual review and release promotion gates pass."

[[work_units]]
id = "SS-PLV2-00"
title = "program checkpoint"
objective = "Open Plasma v2 reference slice without widening runtime, release, or worker claims."
status = "implemented-local"
selected_validation_tier = "T1"
preflight_required = true
postflight_required = true
preflight_receipt = "out/aide/operations/SS-PLV2-00-preflight/operation-receipt.json"
postflight_receipt = "out/aide/operations/SS-PLV2-00-postflight/operation-receipt.json"
rollback_point = "0bc521d"
allowed_paths = [
  ".aide/work_units/plasma-v2-reference-slice.toml",
  "docs/roadmap/plasma-v2-reference-slice.md",
  "validation/captures/plasma-v2/README.md",
  "tools/aideops/screensave_aide.py",
]
forbidden_paths = [
  "products/savers/plasma/src",
  "catalog/proof_profiles.toml",
  "tools/packc",
  "release promotion state",
  "public SDK declarations",
]
expected_validators = [
  "py -3 tools/scripts/check_project_state.py --summary",
  "py -3 tools/scripts/check_contracts.py",
  "py -3 tools/scripts/check_docs_basics.py",
  "git diff --check",
]
baseline_refs = [
  "PROJECT_STATE.toml [portable_v2.status=accepted]",
  "PROJECT_STATE.toml [development.active_program=plasma-v2-reference-slice]",
]
claim_boundary = "D0 opens bounded development governance only; no Plasma runtime, proof profile, pack compiler, artistic acceptance, or release promotion is claimed."

