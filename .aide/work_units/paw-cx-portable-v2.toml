schema_version = 1
id = "SS-PAW-CX-000"
title = "AIDE-operational portable v2"
status = "active"
owner = "repo"
mode = "aide-lite-operational"
required_source_revision = "34b4a00417570617e1468c9676204f87f20dd624"

[goal]
summary = "Repair the ScreenSave-local AIDE operating loop, admit fixed proof capabilities, export proof evidence, and implement the first portable v2 public seam before product migration."
claim_boundary = "This work-unit packet does not accept Gate C, migrate product cores, certify compatibility, or promote Plasma v2."
non_goals = [
  "do not admit a general AIDE worker",
  "do not allow generic command execution",
  "do not mark deterministic proof as artistic acceptance",
  "do not mark PE audit as operating-system certification",
  "do not replace the Win32 .scr baseline",
  "do not start Plasma runtime implementation",
]

[paths]
allowed = [
  ".aide/context",
  ".aide/controller",
  ".aide/policies",
  ".aide/reports/token-baselines.yaml",
  ".aide/tests",
  ".aide/work_units/paw-cx-portable-v2.toml",
  "contracts/portable_semantics_v2.md",
  "contracts/project_adapter_v0.md",
  "platform/include/screensave/README.md",
  "platform/include/screensave/v2",
  "platform/include/screensave/v2.h",
  "tools/aide_bridge",
  "tools/aideops",
  "tools/project_adapter",
  "tools/scripts",
]
forbidden = [
  ".aide.local",
  ".aide/queue",
  "core/apply",
  "core/gateway",
  "core/providers",
  "products/savers/plasma/src",
  "release promotion state",
]

[proof_outputs]
aide_operations_root = "out/aide/operations"
project_adapter_root = "out/aide/screensave-project-adapter/invocations"
evidence_packet_schema = "tools/aide_bridge/schemas/screensave_evidence_packet_v0.schema.json"
portable_v2_validator = "tools/scripts/check_portable_v2.py"

