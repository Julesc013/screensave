schema_version = 1
pilot_id = "screensave-aide-pilot-00"
as_of = "2026-06-26"
status = "aide-lite-operational"
source_strategy = "pinned-lite-safe-import"
import_mode = "safe"
runtime_mode = "external-sidecar-only"
runtime_dependency_allowed = false
automatic_merging_allowed = false
product_runtime_dependency_allowed = false
source_mutation_allowed = false

[authority]
project_state = "PROJECT_STATE.toml"
version_manifest = "VERSION.toml"
product_catalog = "catalog/products.toml"
artifact_profiles = "catalog/artifact_profiles.toml"
aide_lite_lock = ".aide/aide_lite.lock.toml"
aide_profile = ".aide/profile.yaml"
aide_guidance = ".aide/guidance/codex.md"
project_bridge_profile = ".aide/project_bridge_profile.toml"
integration_plan = "docs/roadmap/aide-to-screensave-integration-plan.md"
historical_codex_queues = ".codex/queues"

[scope]
allowed = [
  "AIDE Lite governance, context, repo intelligence, and review",
  "line-ending policy",
  "project-state authority",
  "public release truth",
  "artifact inventory",
  "PE audit",
  "catalog design",
  "validator repair",
  "proof-kernel evidence ingestion",
  "tool inventory and wrap-plan mapping without execution, rename, or deletion",
  "deterministic project bridge profiling",
]
excluded = [
  "general coding worker",
  "source mutation",
  "automatic merging",
  "automatic promotion",
  "runtime product dependency",
  "Plasma v2 rewrite",
  "renderer v2 rewrite",
  "public compatibility widening without evidence",
  "ScreenSave proof-kernel ownership transfer",
]

[layers.lite_governance]
status = "admitted-now"
details = "Governance, context, repo intelligence, evaluation, and review packets run locally from the imported AIDE Lite pack."

[layers.fixed_capability_invocation]
status = "screensave-local-bindings-admitted"
details = "ScreenSave already exposes fixed project adapter capabilities locally; canonical AIDE-repository bridge acceptance remains serialized separately and is not blocked by DistributionManifest v1."

[layers.local_service_trust_evidence]
status = "accepted-aide-components-screensave-generalization-pending"
details = "Accepted AIDE local Service, trust, idempotency, EvidencePacket, and EventRecord components may only be reused through a ScreenSave-specific capability-invocation slice."

[layers.general_worker]
status = "blocked"
details = "No source-editing worker, preview/apply, or automatic merge is admitted."

[validators]
state = "tools/scripts/check_project_state.py"
catalog = "tools/scripts/check_catalog_profiles.py"
pe_audit = "tools/scripts/audit_pe_artifacts.py"
aide_pilot = "tools/scripts/check_aide_pilot.py"
contracts = "tools/scripts/check_contracts.py"
compiled_nocturne_runner = "tools/scripts/check_compiled_nocturne_runner.py"
aide_operational = "tools/scripts/check_aide_operational.py"
aide_evidence_bridge = "tools/scripts/check_aide_evidence_bridge.py"
portable_v2 = "tools/scripts/check_portable_v2.py"

[[work_units]]
id = "SS-TRUTH-000"
title = "Truth and proof baseline"
status = "active"
path = ".aide/work_units/truth-proof-baseline.toml"

[[work_units]]
id = "SS-PAW-CX-000"
title = "AIDE-operational portable v2"
status = "active"
path = ".aide/work_units/paw-cx-portable-v2.toml"

[[evidence_packets]]
id = "SS-EVIDENCE-PE-000"
title = "Current PE artifact audit"
status = "recorded-with-violations"
path = "validation/captures/truth-proof-baseline/pe-audit-current.txt"

[[evidence_packets]]
id = "SS-EVIDENCE-BRIDGE-000"
title = "ScreenSave fixed-command bridge check"
status = "recorded-by-validator"
path = ".aide/evidence_packets/screensave-fixed-command-bridge.toml"
