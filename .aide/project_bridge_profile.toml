schema_version = 1
profile_id = "screensave-deterministic-project-bridge-v0"
as_of = "2026-06-26"
status = "aide-lite-operational"
owner = "ScreenSave"
import_mode = "safe"
runtime_mode = "external-sidecar-only"
source_mutation_allowed = false

[authority]
project_state = "PROJECT_STATE.toml"
aide_lite_lock = ".aide/aide_lite.lock.toml"
profile = ".aide/profile.yaml"
adapter_contract = "contracts/project_adapter_v0.md"
integration_plan = "docs/roadmap/aide-to-screensave-integration-plan.md"
adapter_command = "tools/project_adapter/screensave_project.py"
capability_bindings = "tools/project_adapter/capability_bindings.json"
receipt_schemas = "tools/project_adapter/receipt_schemas.json"
artifact_profile_audit_roots = "tools/project_adapter/artifact_profile_audit_roots.json"
output_root = "out/aide/screensave-project-adapter/invocations"

[bridge]
class = "deterministic-project-bridge"
mutation_allowed = false
automatic_merge_allowed = false
release_publication_allowed = false
compatibility_certification_allowed = false
artistic_acceptance_allowed = false
worker_runtime_required = false
local_process_worker_required = false
aide_side_bridge_admission = "canonical-aide-repo-acceptance-pending"

[readiness]
aide_lite_operational = "ready-now"
screen_save_fixed_capabilities = "screensave-side-admitted"
contained_generated_proof_commands = "screensave-side-admitted"
aide_side_deterministic_bridge = "screensave-local-bindings-ready"
screen_save_durable_capability_invocation = "planned-after-aide-bridge"
coding_agent_data_pack_proposal = "later"
source_patch_preview_apply = "blocked"
automatic_product_promotion_or_release = "deliberately-excluded"
external_aide_runtime_admission = "outside-this-repository"

[future_bridge]
status = "planned"
required_aide_tasks = [
  "AIDE-BUILD-SCREENSAVE-DETERMINISTIC-BRIDGE-V1-01",
  "AIDE-CHECK-SCREENSAVE-DETERMINISTIC-BRIDGE-V1-01",
  "AIDE-ACCEPT-SCREENSAVE-DETERMINISTIC-BRIDGE-V1-01",
]
exact_capabilities = [
  "screensave.project.status",
  "screensave.project.capabilities",
  "screensave.catalog.read",
  "screensave.validation.core",
  "screensave.build.windows-current-x86",
  "screensave.build.windows-current-tools",
  "screensave.proof.profile.nocturne",
  "screensave.proof.profile.ricochet",
  "screensave.proof.bundle.normalize",
  "screensave.artifact.pe.audit",
]

[[capabilities]]
name = "screensave.project.status"
status = "screensave-side-admitted-read-only"
command = ["python", "tools/project_adapter/screensave_project.py", "status"]

[[capabilities]]
name = "screensave.project.capabilities"
status = "screensave-side-admitted-read-only"
command = ["python", "tools/project_adapter/screensave_project.py", "capabilities"]

[[capabilities]]
name = "screensave.catalog.read"
status = "screensave-side-admitted-read-only"
command = ["python", "tools/project_adapter/screensave_project.py", "catalog"]

[[capabilities]]
name = "screensave.validation.core"
status = "screensave-side-admitted-read-only"
command = ["python", "tools/project_adapter/screensave_project.py", "validate"]

[[capabilities]]
name = "screensave.build.windows-current-x86"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "build", "--invocation-id", "<safe-id>", "--profile", "windows-current-x86"]

[[capabilities]]
name = "screensave.build.windows-current-tools"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "build", "--invocation-id", "<safe-id>", "--profile", "windows-current-tools"]

[[capabilities]]
name = "screensave.proof.nocturne.render"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "render", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.proof.capture.compare"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "compare", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.artifact.pe.audit"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "audit", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.proof.nocturne.exact"
status = "screensave-side-admitted-contained-output"
command = ["python", "tools/project_adapter/screensave_project.py", "proof", "--invocation-id", "<safe-id>"]

[refusals]
source_patch_preview = "later"
source_patch_apply = "later"
data_pack_worker = "blocked until ScreenSave pack compiler and AIDE worker/runtime gates exist"
automatic_promotion = "deliberately deferred"

[checks]
adapter_validator = "python tools\\scripts\\check_project_adapter.py"
aide_pilot_validator = "python tools\\scripts\\check_aide_pilot.py"
project_state_validator = "python tools\\scripts\\check_project_state.py"
