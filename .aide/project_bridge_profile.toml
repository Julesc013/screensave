schema_version = 1
profile_id = "screensave-deterministic-project-bridge-v0"
as_of = "2026-06-25"
status = "report-only-ready"
owner = "ScreenSave"

[authority]
project_state = "PROJECT_STATE.toml"
adapter_contract = "contracts/project_adapter_v0.md"
adapter_command = "tools/project_adapter/screensave_project.py"
capability_bindings = "tools/project_adapter/capability_bindings.json"
receipt_schemas = "tools/project_adapter/receipt_schemas.json"
output_root = "out/proof/project-adapter/invocations"

[bridge]
class = "deterministic-project-bridge"
mutation_allowed = false
automatic_merge_allowed = false
release_publication_allowed = false
compatibility_certification_allowed = false
artistic_acceptance_allowed = false
worker_runtime_required = false
local_process_worker_required = false

[[capabilities]]
name = "screensave.project.status"
status = "admittable-now"
command = ["python", "tools/project_adapter/screensave_project.py", "status"]

[[capabilities]]
name = "screensave.project.capabilities"
status = "admittable-now"
command = ["python", "tools/project_adapter/screensave_project.py", "capabilities"]

[[capabilities]]
name = "screensave.catalog.read"
status = "admittable-now"
command = ["python", "tools/project_adapter/screensave_project.py", "catalog"]

[[capabilities]]
name = "screensave.validation.core"
status = "admittable-now"
command = ["python", "tools/project_adapter/screensave_project.py", "validate"]

[[capabilities]]
name = "screensave.proof.nocturne.render"
status = "admittable-after-independent-check"
command = ["python", "tools/project_adapter/screensave_project.py", "render", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.proof.capture.compare"
status = "admittable-after-independent-check"
command = ["python", "tools/project_adapter/screensave_project.py", "compare", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.artifact.pe.audit"
status = "admittable-after-independent-check"
command = ["python", "tools/project_adapter/screensave_project.py", "audit", "--invocation-id", "<safe-id>"]

[[capabilities]]
name = "screensave.proof.nocturne.exact"
status = "admittable-after-independent-check"
command = ["python", "tools/project_adapter/screensave_project.py", "proof", "--invocation-id", "<safe-id>"]

[refusals]
source_patch_preview = "later"
source_patch_apply = "later"
data_pack_worker = "blocked until ScreenSave pack compiler and AIDE worker/runtime gates exist"
automatic_promotion = "deliberately deferred"

[checks]
adapter_validator = "python tools\\scripts\\check_project_adapter.py"
aide_pilot_validator = "python tools\\scripts\\check_aide_pilot.py"
project_state_validator = "python tools\\scripts\\check_project_state.py"
