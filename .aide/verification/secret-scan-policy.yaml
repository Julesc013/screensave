schema_version: aide.secret-scan-policy.v0
policy_id: q12.secret-scan.v0
status: active-pending-review
purpose: Detect obvious high-risk secret-like values in committed AIDE verifier surfaces without failing policy text.
high_risk_patterns:
  - openai_sk_prefix_long_value
  - anthropic_sk_ant_prefix_long_value
  - assignment_to_api_key_secret_token_password_with_long_value
policy_text_false_positive_allowance:
  enabled: true
  examples:
    - api_key as a policy term
    - SECRET as a policy heading
    - TOKEN_ESTIMATE as a section name
generated_files_to_scan:
  - .aide/**
  - AGENTS.md
  - README.md
  - ROADMAP.md
  - PLANS.md
  - IMPLEMENT.md
  - DOCUMENTATION.md
  - core/harness/**
  - scripts/**
forbidden_storage:
  - raw provider keys
  - .env contents
  - raw prompt logs containing credentials
  - local state under .aide.local/
current_limitation: Secret scanning is heuristic and does not replace a dedicated security scanner.
