receipt_schemas = "tools/project_adapter/receipt_schemas.json"
artifact_profile_audit_roots = "tools/project_adapter/artifact_profile_audit_roots.json"
aide_lite_lock = ".aide/aide_lite.lock.toml"

[checks]
project_adapter = "python tools\\scripts\\check_project_adapter.py"
aide_pilot = "python tools\\scripts\\check_aide_pilot.py"
project_state = "python tools\\scripts\\check_project_state.py --summary"
