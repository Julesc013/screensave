schema_version = 1
id = "SS-EVIDENCE-BRIDGE-000"
title = "ScreenSave fixed-command bridge check"
status = "recorded-by-validator"
as_of = "2026-06-26"

[claim]
summary = "ScreenSave exposes a deterministic fixed-command bridge for bounded AIDE Lite operational consumption."
scope = [
  "status",
  "capabilities",
  "catalog",
  "validate",
  "render",
  "compare",
  "audit",
  "proof",
  "equivalence",
  "proof includes Nocturne render, exact compare, and artifact-profile PE audit facts",
  "portable v2 equivalence is projected as a separate claim",
  "read-only deterministic commands are ScreenSave-side admitted",
  "generated proof commands are ScreenSave-side admitted only through contained output roots",
]
non_claims = [
  "not an AIDE worker-host acceptance",
  "not source patch preview/apply",
  "not automatic merge",
  "not release promotion",
  "not compatibility certification",
  "not artistic acceptance",
]

[authority]
integration_plan = "docs/roadmap/aide-to-screensave-integration-plan.md"
project_bridge_profile = ".aide/project_bridge_profile.toml"
