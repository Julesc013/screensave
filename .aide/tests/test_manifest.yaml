schema_version: screensave.aide-test-manifest.v0
manifest_id: screensave-aide-tests-v0
status: active
owner: ScreenSave
purpose: Deterministic ScreenSave-local checks that complement imported AIDE Lite golden tasks.
runner: py -3 tools/scripts/check_aide_operational.py
tests:
  - id: screensave-aide-bootstrap-static
    title: AIDE bootstrap static files exist
    command: py -3 tools/scripts/check_aide_operational.py
    evidence_refs:
      - .aide/reports/token-baselines.yaml
      - .aide/controller/failure-taxonomy.yaml
      - tools/aideops/screensave_aide.py
  - id: screensave-validation-tier-map
    title: ScreenSave validation tiers are fixed and callable
    command: py -3 tools/scripts/check_aide_operational.py
    evidence_refs:
      - .aide/tests/test_impact_map.yaml
      - tools/project_adapter/screensave_project.py
  - id: screensave-golden-task-definitions
    title: ScreenSave deterministic golden tasks are defined outside LLM judging
    command: py -3 tools/scripts/check_aide_operational.py
    evidence_refs:
      - .aide/tests/test_impact_map.yaml
