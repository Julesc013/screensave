schema_version: aide.release-checklist-policy.v0
policy_id: aide-release-checklist-v0
status: active
purpose: >
  Define the manual publication checklist generated by Q48 for human review
  before any future explicit publication phase.
sections:
  - source repo state
  - validation gates
  - artifact gates
  - security gates
  - documentation gates
  - target install caveats
  - publication blockers
  - manual review items
  - future publish commands preview
source_state_checks:
  - branch checked
  - source commit recorded
  - dirty state recorded
  - tag not created yet
validation_gates:
  - scripts/aide validate
  - scripts/aide doctor
  - AIDE Lite validate/test/selftest/eval
  - pack-status
  - release validate
  - draft validate
  - secret scan
artifact_gates:
  - zip exists
  - tar.gz exists
  - checksums exist
  - manifest exists
  - install notes exist
  - changelog/release notes preview exist
  - fixture extraction passed
security_gates:
  - no .aide.local
  - no .env
  - no secrets
  - no raw prompts/responses
  - no provider keys
manual_review_items:
  - review release body
  - review suggested tag
  - review asset list
  - review known risks
  - review target install caveats
  - decide whether this is pre-release/draft/stable
  - decide whether to publish
publication_blockers:
  - any failed validation
  - dirty state not accepted
  - missing artifact
  - missing checksum
  - secrets found
  - target install not yet proven if release claims target readiness
