schema_version: aide.test-tiers-policy.v0
policy_id: aide.validation-tiers.v0
status: active
mode: screensave_fixed_commands

tiers:
  T0:
    name: screensave_authority_and_syntax
    purpose: Fast ScreenSave authority, contract, docs, AIDE pilot, and whitespace checks.
    normal_post_task: true
    promotion_gate: false
    command: py -3 tools/project_adapter/screensave_project.py validate --tier T0
  T1:
    name: screensave_affected_subsystem
    purpose: Changed-area checks for catalogs, adapter, libsslab, proof bundle, proof kernel, and Workbench shell.
    normal_post_task: true
    promotion_gate: false
    command: py -3 tools/project_adapter/screensave_project.py validate --tier T1
  T2:
    name: screensave_full_local_project_gate
    purpose: Full local check-script sweep plus fixed Nocturne and Ricochet proof profiles.
    normal_post_task: false
    promotion_gate: conditional
    command: py -3 tools/project_adapter/screensave_project.py validate --tier T2
  T3:
    name: screensave_native_and_extended_evidence
    purpose: Native Windows builds, exact manifests, PE audit, proof normalization, soak, and release evidence.
    normal_post_task: false
    promotion_gate: true
    command: operator-scheduled native evidence gate; not an admitted AIDE fixed capability

defaults:
  normal_post_task:
    required_tiers: [T0, T1]
    excludes_default_full_discovery: true
  larger_task:
    required_tiers: [T0, T1]
    include_relevant_t2: true
  checkpoint_promotion_release:
    required_tiers: [T0, T1, relevant_T2, T3]
    full_discovery_required: true

rules:
  no_skip_to_pass: true
  must_not_delete_tests: true
  skip_to_make_green_forbidden: true
  target_specific_preservation: true
  must_not_overwrite_target_manifests: true
  no_target_execution_in_cross_repo_audits: true
  full_suite_is_t3_not_normal_default: true
  generic_command_capability_forbidden: true
  t3_not_admitted_as_aide_fixed_capability: true
