schema_version: aide.upgrade-policy.v0
policy_id: aide.upgrade.v0
status: active
purpose: >
  Define deterministic, preservation-first AIDE upgrade observation,
  comparison, planning, and dry-run behavior before any future upgrade apply
  phase.
operating_mode:
  - deterministic_local
  - no_model_calls
  - no_provider_calls
  - no_network_calls
  - observe_compare_plan_dry_run_only
  - no_apply_in_q45
  - no_target_mutation
  - no_file_overwrite
  - no_file_deletion
  - no_migration_without_mandatory_reason
lifecycle:
  - observe_current_install
  - observe_source_pack
  - compare
  - classify_differences
  - plan
  - dry_run
  - review
  - future_apply
  - future_verify
  - future_rollback
default_rules:
  additive_by_default: true
  preserve_target_state_by_default: true
  overwrite_allowed_default: false
  delete_allowed_default: false
  apply_allowed_default: false
  migration_automatic_default: false
  source_generated_state_is_target_truth: false
non_goals:
  - no apply
  - no target mutation
  - no repair apply
  - no rollback
  - no uninstall
  - no install apply
