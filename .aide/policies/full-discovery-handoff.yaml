schema_version: aide.full-discovery-handoff-policy.v0
policy_id: aide.full-discovery-handoff.v0
status: active-pending-review
mode: report_only

handoff:
  status: WAITING_FOR_EXTERNAL_FULL_DISCOVERY
  external_runner: required
  must_not_execute: true
  expected_summary_path: required
  expected_raw_log_artifact_paths: required
  stale_summary_rule: summary_commit_and_branch_must_match_request
  resume_instruction: required

placement:
  tier: T3
  normal_post_task_default: false
  checkpoint_promotion_release_gate: true

forbidden:
  run_full_suite_inside_handoff_command: true
  mutate_target_repo: true
  install_ci: true
  call_network_or_provider: true
