[doctrine]
version=C15
primary_channel=core
primary_product=ScreenSave Core
next_step=C16 Core release refresh and baseline freeze

[docs]
release_channels=docs/roadmap/release-channels.md
core_doctrine=docs/roadmap/core-zip-doctrine.md
channel_matrix=validation/notes/c15-channel-matrix.md

[channel.core]
display_name=ScreenSave Core
role=primary
audience=end_user
artifact=zip
source_manifest=packaging/portable/bundle_manifest.ini
gate=core_release_gate
includes=release-grade standalone savers; anthology only if it satisfies the same gate; required standalone docs and packs
excludes=installer;suite;benchlab;sdk;extras

[channel.installer]
display_name=ScreenSave Installer
role=companion
audience=end_user
artifact=installer_package
source_manifest=packaging/installer/installer_manifest.ini
built_on=core
includes=installed-distribution convenience for the Core saver line
excludes=suite;benchlab;sdk;extras

[channel.suite]
display_name=ScreenSave Suite
role=companion
audience=end_user
artifact=app
source_tree=products/apps/suite
includes=browse;launch;preview;settings handoff
excludes=core membership authority;benchlab diagnostics;sdk authoring

[channel.benchlab]
display_name=ScreenSave BenchLab
role=companion
audience=developer_or_advanced_user
artifact=app
source_tree=products/apps/benchlab
includes=diagnostics;validation;runtime and renderer inspection
excludes=primary end-user bundle status;suite identity;sdk identity

[channel.sdk]
display_name=ScreenSave SDK
role=companion
audience=contributor
artifact=docs_and_templates
source_tree=products/sdk
includes=template saver;examples;authoring guidance;validators
excludes=core runtime payload;installer payload;benchlab identity

[channel.extras]
display_name=ScreenSave Extras
role=companion
audience=opt_in_experimenter
artifact=optional_bonus_content
source_tree=packaging/portable/OPTIONAL
includes=experimental packs;unstable showcase material;renderer-heavy or lower-confidence content
excludes=anything required for the primary Core experience

[gate.core_release_gate]
requirements=standalone_scr;coherent_windows_picker_and_settings_path;acceptable_gdi_baseline;curated_defaults;coherent_metadata_and_versioning;documented_limitations;release_polish;companion_independence
