[bundle]
key=screensave-core
display_name=ScreenSave Core
version_label=0.15.0
staging_name=screensave-core-c16-baseline
zip_name=screensave-core-c16-baseline.zip

[output_roots]
msvc_release=out/msvc/vs2022/Release
mingw_release=out/mingw/i686/release
msvc_debug=out/msvc/vs2022/Debug
mingw_debug=out/mingw/i686/debug

[policy]
benchlab=excluded
suite=excluded
developer_extras=excluded
legacy_outputs=ignore
packs=stage_only_when_owning_saver_binary_exists

[doctrine]
channel=core
primary_product=yes
channel_manifest=packaging/channel_manifest.ini

[docs]
portable_readme=packaging/portable/README.md
portable_layout=packaging/portable/layout.md
release_notes=packaging/release_notes/portable-release-notes.md
bundle_matrix=validation/notes/c16-core-inclusion-matrix.md
release_channels=docs/roadmap/release-channels.md
core_doctrine=docs/roadmap/core-zip-doctrine.md
channel_matrix=validation/notes/c15-channel-matrix.md
channel_manifest=packaging/channel_manifest.ini
baseline_note=packaging/release_notes/core-baseline-notes.md
known_issues=validation/notes/c16-known-issues.md
compatibility_note=packaging/release_notes/core-compatibility-notes.md
companion_matrix=validation/notes/c16-companion-channel-matrix.md
release_baseline=validation/notes/c16-release-baseline.md
integrity_note=validation/notes/c14-config-integrity.md
windows_validation=validation/notes/c05-windows-integration-matrix.md
project_changelog=CHANGELOG.md
assets_license=assets/licenses/README.md
third_party_license=third_party/licenses/README.md

[saver.nocturne]
binary_relpath=nocturne/nocturne.scr
manifest=products/savers/nocturne/manifest.ini
pack_dirs=

