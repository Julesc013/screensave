[bundle]
key=screensave-installer
display_name=ScreenSave Installer
version_label=0.15.0
staging_name=screensave-installer-c16-baseline
zip_name=screensave-installer-c16-baseline.zip

[portable_source]
staging_root=out/portable/screensave-core-c16-baseline
zip_path=out/portable/screensave-core-c16-baseline.zip

[install]
supported_mode=current_user
default_root_suffix=ScreenSave\Installed\CurrentUser
uninstall_key=ScreenSave.CurrentUser
selection_assistance=manual_opt_in
preserve_user_config=yes
prune_missing_from_payload=no
machine_wide_mode=deferred

[doctrine]
channel=installer
primary_product=no
built_on=core
channel_manifest=packaging/channel_manifest.ini

[docs]
installer_readme=packaging/installer/README.md
installer_layout=packaging/installer/layout.md
release_notes=packaging/release_notes/installer-release-notes.md
installer_matrix=validation/notes/c16-installer-matrix.md
portable_matrix=validation/notes/c16-core-inclusion-matrix.md
release_channels=docs/roadmap/release-channels.md
core_doctrine=docs/roadmap/core-zip-doctrine.md
channel_matrix=validation/notes/c15-channel-matrix.md
channel_manifest=packaging/channel_manifest.ini
baseline_note=packaging/release_notes/core-baseline-notes.md
release_baseline=validation/notes/c16-release-baseline.md
companion_matrix=validation/notes/c16-companion-channel-matrix.md
known_issues=validation/notes/c16-known-issues.md
compatibility_note=packaging/release_notes/core-compatibility-notes.md
integrity_note=validation/notes/c14-config-integrity.md
windows_validation=validation/notes/c05-windows-integration-matrix.md
project_changelog=CHANGELOG.md
assets_license=assets/licenses/README.md
third_party_license=third_party/licenses/README.md
