[bundle]
key=screensave-installer
display_name=ScreenSave Current-User Installer
version_label=c07
staging_name=screensave-installer-c07
zip_name=screensave-installer-c07.zip

[portable_source]
staging_root=out/portable/screensave-portable-c06
zip_path=out/portable/screensave-portable-c06.zip

[install]
supported_mode=current_user
default_root_suffix=ScreenSave\Installed\CurrentUser
uninstall_key=ScreenSave.CurrentUser
selection_assistance=manual_opt_in
preserve_user_config=yes
prune_missing_from_payload=no
machine_wide_mode=deferred

[docs]
installer_readme=packaging/installer/README.md
installer_layout=packaging/installer/layout.md
release_notes=packaging/release_notes/installer-release-notes.md
installer_matrix=validation/notes/c07-installer-matrix.md
portable_matrix=validation/notes/c06-portable-bundle-matrix.md
windows_validation=validation/notes/c05-windows-integration-matrix.md
project_changelog=CHANGELOG.md
assets_license=assets/licenses/README.md
third_party_license=third_party/licenses/README.md
