[product]
key=benchlab
name=BenchLab
kind=app
version=0.9.0

[identity]
summary=Developer-facing diagnostics harness for the current nineteen-product saver runtime and versioned renderer ladder.
default_saver=nocturne
available_savers=nocturne,ricochet,deepfield,plasma,phosphor,pipeworks,lifeforms,signals,mechanize,ecosystems,stormglass,transit,observatory,vector,explorer,city,atlas,gallery,anthology

[capabilities]
windowed_harness=1
deterministic_mode=1
