[product]
key=benchlab
name=BenchLab
kind=app
version=0.9.0

[identity]
summary=Developer-facing diagnostics harness for the current saver runtime and dual-backend renderer path.
default_saver=nocturne
available_savers=nocturne,ricochet,deepfield

[capabilities]
windowed_harness=1
deterministic_mode=1
runtime_info_panel=1
renderer_selection=1
fallback_reporting=1
multi_product_selection=1
