model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[agents]
max_threads = 4
max_depth = 1

[agents.repo_explorer]
description = "Read-only repository mapper for locating relevant files, constraints, and series boundaries."
config_file = "./agents/repo_explorer.toml"

[agents.repo_architect]
description = "High-rigor architect for specs, docs, interfaces, and repository contracts."
config_file = "./agents/repo_architect.toml"

[agents.implementer]
description = "Scoped implementation worker that follows the platform contracts and keeps edits local."
config_file = "./agents/implementer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, omissions, and missing verification."
config_file = "./agents/reviewer.toml"
