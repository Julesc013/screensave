name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure and governance files
        run: python tools/scripts/check_repo_structure.py

      - name: Validate project-scoped Codex configuration
        run: python tools/scripts/check_codex_config.py
