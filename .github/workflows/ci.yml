name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure and governance files
        run: python tools/scripts/check_repo_structure.py

      - name: Validate project-scoped Codex configuration
        run: python tools/scripts/check_codex_config.py

      - name: Validate build scaffold layout
        run: |
          python tools/scripts/check_build_layout.py
          python tools/scripts/check_build_controller.py

      - name: Validate project state
        run: python tools/scripts/check_project_state.py --summary

      - name: Validate catalog authority
        run: |
          python tools/scripts/check_catalog_profiles.py
          python tools/scripts/check_artifact_sets.py
          python tools/scripts/check_catalog_generated.py

      - name: Validate contracts and product architecture
        run: |
          python tools/scripts/check_contracts.py
          python tools/scripts/check_product_architecture.py
          python tools/scripts/check_visual_intent_contract.py

  proof-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install proof compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          gcc --version

      - name: Build compiled Nocturne proof runner
        run: python tools/scripts/check_compiled_nocturne_runner.py

      - name: Validate Proof Kernel v0
        run: python tools/scripts/check_proof_kernel.py

      - name: Render CI Nocturne proof capture
        run: >
          python tools/sslab/sslab.py render
          --product nocturne
          --preset observatory_night
          --width 96
          --height 54
          --seed 1536
          --frames 8
          --delta-ms 100
          --output-dir out/ci/proof-kernel/nocturne

      - name: Compare CI capture to committed baseline
        run: >
          python tools/sslab/sslab.py compare
          --actual out/ci/proof-kernel/nocturne/capture.ppm
          --expected validation/captures/proof-kernel-v0/nocturne/capture.ppm
          --class exact
          --output-json out/ci/proof-kernel/nocturne/comparison.json

      - name: Run CI Nocturne lifecycle proof
        run: >
          python tools/sslab/sslab.py lifecycle
          --product nocturne
          --preset observatory_night
          --width 96
          --height 54
          --resize-width 80
          --resize-height 45
          --seed 1536
          --frames 8
          --delta-ms 100
          --output-dir out/ci/proof-kernel/nocturne-lifecycle

      - name: Upload proof-kernel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-kernel-nocturne
          path: out/ci/proof-kernel
          if-no-files-found: error

  project-adapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install proof compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run read-only adapter commands
        run: |
          mkdir -p out/ci/project-adapter
          python tools/project_adapter/screensave_project.py status > out/ci/project-adapter/status.json
          python tools/project_adapter/screensave_project.py capabilities > out/ci/project-adapter/capabilities.json
          python tools/project_adapter/screensave_project.py catalog > out/ci/project-adapter/catalog.json
          python tools/project_adapter/screensave_project.py validate > out/ci/project-adapter/validate.json
          python tools/project_adapter/screensave_project.py build --invocation-id ci-build --profile windows-current-x86 --dry-run > out/ci/project-adapter/build.json

      - name: Run contained render and compare adapter commands
        run: |
          python tools/project_adapter/screensave_project.py render --invocation-id ci-render > out/ci/project-adapter/render.json
          python tools/project_adapter/screensave_project.py compare --invocation-id ci-compare --actual out/aide/screensave-project-adapter/invocations/render/ci-render/capture.ppm > out/ci/project-adapter/compare.json

      - name: Upload adapter receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-adapter-receipts
          path: |
            out/ci/project-adapter
            out/aide/screensave-project-adapter/invocations/build/ci-build
            out/aide/screensave-project-adapter/invocations/render/ci-render
            out/aide/screensave-project-adapter/invocations/compare/ci-compare
          if-no-files-found: error

  windows-native-current-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Validate build controller
        run: python tools\scripts\check_build_controller.py

      - name: Build and audit current Windows x86 savers
        run: >
          python tools\buildctl\screensave_build.py build
          --profile windows-current-x86
          --output-dir out\ci\windows-current-x86

      - name: Build and audit current Windows tools
        run: >
          python tools\buildctl\screensave_build.py build
          --profile windows-current-tools
          --output-dir out\ci\windows-current-tools

      - name: Upload native Windows build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-current-x86-build-evidence
          path: |
            out\ci\windows-current-x86
            out\ci\windows-current-tools
            out\msvc\vs2022\Release
          if-no-files-found: error
