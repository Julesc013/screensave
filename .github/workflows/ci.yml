name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure and governance files
        run: python tools/scripts/check_repo_structure.py

      - name: Validate project-scoped Codex configuration
        run: python tools/scripts/check_codex_config.py

      - name: Validate build scaffold layout
        run: |
          python tools/scripts/check_build_layout.py
          python tools/scripts/check_build_controller.py

      - name: Validate project state
        run: python tools/scripts/check_project_state.py --summary

      - name: Validate catalog authority
        run: |
          python tools/scripts/check_catalog_profiles.py
          python tools/scripts/check_artifact_sets.py
          python tools/scripts/check_catalog_generated.py

      - name: Validate contracts and product architecture
        run: |
          python tools/scripts/check_contracts.py
          python tools/scripts/check_product_architecture.py
          python tools/scripts/check_visual_intent_contract.py

  portable-v2-equivalence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install portable proof compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Validate portable v2 public seam
        run: python tools/scripts/check_portable_v2.py

      - name: Validate libsslab v1 and v2 runner paths
        run: python tools/scripts/check_sslab_runner.py

      - name: Run direct portable v2 proof matrix
        run: |
          python tools/sslab/sslab.py proof --profile nocturne.reference.v0 --path v2 --output-dir out/ci/portable-v2/nocturne
          python tools/sslab/sslab.py proof --profile ricochet.reference.v1 --path v2 --output-dir out/ci/portable-v2/ricochet

      - name: Prove portable v2 equivalence
        run: >
          python tools/sslab/sslab_equivalence.py
          --output out/ci/portable-v2/equivalence.json
          --work-root out/ci/portable-v2/equivalence-captures

      - name: Validate Workbench v2 Inspect
        run: python tools/scripts/check_workbench_shell.py

      - name: Upload portable v2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-v2-equivalence
          path: out/ci/portable-v2
          if-no-files-found: error

  proof-kernel:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up proof compiler
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add proof compiler to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build compiled Nocturne proof runner
        run: python tools/scripts/check_compiled_nocturne_runner.py

      - name: Validate Proof Kernel v0
        run: python tools/scripts/check_proof_kernel.py

      - name: Validate generic libsslab runner
        run: python tools/scripts/check_sslab_runner.py

      - name: Render CI Nocturne proof capture
        run: >
          python tools/sslab/sslab.py render
          --product nocturne
          --preset observatory_night
          --width 96
          --height 54
          --seed 1536
          --frames 8
          --delta-ms 100
          --output-dir out/ci/proof-kernel/nocturne

      - name: Compare CI capture to committed baseline
        run: >
          python tools/sslab/sslab.py compare
          --actual out/ci/proof-kernel/nocturne/capture.ppm
          --expected validation/captures/proof-kernel-v0/nocturne/capture.ppm
          --class exact
          --output-json out/ci/proof-kernel/nocturne/comparison.json

      - name: Run CI Nocturne lifecycle proof
        run: >
          python tools/sslab/sslab.py lifecycle
          --product nocturne
          --preset observatory_night
          --width 96
          --height 54
          --resize-width 80
          --resize-height 45
          --seed 1536
          --frames 8
          --delta-ms 100
          --output-dir out/ci/proof-kernel/nocturne-lifecycle

      - name: Run CI proof-profile matrix
        run: |
          python tools\sslab\sslab.py proof --profile nocturne.reference.v0 --path v1 --output-dir out\ci\proof-kernel\matrix\nocturne-v1
          python tools\sslab\sslab.py proof --profile nocturne.reference.v0 --path v2 --output-dir out\ci\proof-kernel\matrix\nocturne-v2
          python tools\sslab\sslab.py proof --profile ricochet.reference.v1 --path v1 --output-dir out\ci\proof-kernel\matrix\ricochet-v1
          python tools\sslab\sslab.py proof --profile ricochet.reference.v1 --path v2 --output-dir out\ci\proof-kernel\matrix\ricochet-v2
          python tools\sslab\sslab.py profile --product nocturne --preset observatory_night --width 96 --height 54 --seed 1536 --frames 8 --delta-ms 100 --iterations 3 --short-soak-cycles 2 --output-dir out\ci\proof-kernel\matrix\nocturne-profile
          python tools\sslab\sslab.py profile --product ricochet --preset classic_clean --width 128 --height 72 --seed 2048 --frames 32 --delta-ms 100 --iterations 3 --short-soak-cycles 2 --output-dir out\ci\proof-kernel\matrix\ricochet-profile

      - name: Run CI portable v2 equivalence
        run: >
          python tools\sslab\sslab_equivalence.py
          --output out\ci\proof-kernel\matrix\portable-v2-equivalence.json
          --work-root out\ci\proof-kernel\matrix\portable-v2-equivalence-captures

      - name: Compose CI Ricochet Proof Bundle v1
        run: >
          python tools\proofbundle\proofbundle.py normalize
          --proof out\ci\proof-kernel\matrix\ricochet-v2\profile-proof.json
          --performance out\ci\proof-kernel\matrix\ricochet-profile\profile.json
          --portable-v2-equivalence out\ci\proof-kernel\matrix\portable-v2-equivalence.json
          --output out\ci\proof-kernel\matrix\ricochet-proof-bundle-v1.json

      - name: Upload proof-kernel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-kernel-nocturne
          path: out/ci/proof-kernel
          if-no-files-found: error

  project-adapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install proof compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run read-only adapter commands
        run: |
          mkdir -p out/ci/project-adapter
          python tools/project_adapter/screensave_project.py status > out/ci/project-adapter/status.json
          python tools/project_adapter/screensave_project.py capabilities > out/ci/project-adapter/capabilities.json
          python tools/project_adapter/screensave_project.py catalog > out/ci/project-adapter/catalog.json
          python tools/project_adapter/screensave_project.py validate > out/ci/project-adapter/validate.json
          python tools/project_adapter/screensave_project.py validate --tier T2 > out/ci/project-adapter/validate-t2.json
          python tools/project_adapter/screensave_project.py build --invocation-id ci-build --profile windows-current-x86 --dry-run > out/ci/project-adapter/build.json

      - name: Run contained render and compare adapter commands
        run: |
          python tools/project_adapter/screensave_project.py render --invocation-id ci-render > out/ci/project-adapter/render.json
          python tools/project_adapter/screensave_project.py compare --invocation-id ci-compare --actual out/aide/screensave-project-adapter/invocations/render/ci-render/capture.ppm > out/ci/project-adapter/compare.json
          python tools/project_adapter/screensave_project.py equivalence --invocation-id ci-portable-v2-equivalence > out/ci/project-adapter/equivalence.json

      - name: Upload adapter receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-adapter-receipts
          path: |
            out/ci/project-adapter
            out/aide/screensave-project-adapter/invocations/build/ci-build
            out/aide/screensave-project-adapter/invocations/render/ci-render
            out/aide/screensave-project-adapter/invocations/compare/ci-compare
            out/aide/screensave-project-adapter/invocations/equivalence/ci-portable-v2-equivalence
          if-no-files-found: error

  windows-native-current-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up proof compiler
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add proof compiler to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Validate build controller
        run: python tools\scripts\check_build_controller.py

      - name: Build and audit current Windows x86 savers
        run: >
          python tools\buildctl\screensave_build.py build
          --profile windows-current-x86
          --output-dir out\ci\windows-current-x86

      - name: Build and audit current Windows tools
        run: >
          python tools\buildctl\screensave_build.py build
          --profile windows-current-tools
          --output-dir out\ci\windows-current-tools

      - name: Run Windows adapter proof
        run: |
          New-Item -ItemType Directory -Force out\ci\windows-current-proof | Out-Null
          python tools\project_adapter\screensave_project.py proof --invocation-id windows-current-nocturne-v1 --profile nocturne.reference.v0 --path v1 > out\ci\windows-current-proof\adapter-proof-nocturne-v1.json
          python tools\project_adapter\screensave_project.py proof --invocation-id windows-current-nocturne-v2 --profile nocturne.reference.v0 --path v2 > out\ci\windows-current-proof\adapter-proof-nocturne-v2.json
          python tools\project_adapter\screensave_project.py proof --invocation-id windows-current-ricochet-v1 --profile ricochet.reference.v1 --path v1 > out\ci\windows-current-proof\adapter-proof-ricochet-v1.json
          python tools\project_adapter\screensave_project.py proof --invocation-id windows-current-ricochet-v2 --profile ricochet.reference.v1 --path v2 > out\ci\windows-current-proof\adapter-proof-ricochet-v2.json
          python tools\project_adapter\screensave_project.py equivalence --invocation-id windows-current-portable-v2-equivalence > out\ci\windows-current-proof\adapter-equivalence.json

      - name: Normalize Windows Proof Bundle v1
        run: >
          python tools\proofbundle\proofbundle.py normalize
          --proof out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v2\proof.json
          --comparison out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v2\comparison.json
          --pe-audit-json out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v2\pe-audit.json
          --build-receipt out\ci\windows-current-x86\build-receipt.json
          --adapter-receipt out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v2\adapter-proof.json
          --portable-v2-equivalence out\aide\screensave-project-adapter\invocations\equivalence\windows-current-portable-v2-equivalence\portable-v2-equivalence.json
          --output out\ci\windows-current-proof\proof-bundle-v1.json

      - name: Upload native Windows build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-current-x86-build-evidence
          path: |
            out\ci\windows-current-x86
            out\ci\windows-current-tools
            out\ci\windows-current-proof
            out\aide\screensave-project-adapter\invocations\proof\windows-current-nocturne-v1
            out\aide\screensave-project-adapter\invocations\proof\windows-current-nocturne-v2
            out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v1
            out\aide\screensave-project-adapter\invocations\proof\windows-current-ricochet-v2
            out\aide\screensave-project-adapter\invocations\equivalence\windows-current-portable-v2-equivalence
            out\msvc\vs2017_xp\Release
            out\msvc\vs2022\Release
          if-no-files-found: error
