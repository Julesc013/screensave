name: Compatibility report
description: Record how the repository, tooling, or a later product behaves on a specific system.
title: "[Compatibility]: "
labels:
  - compatibility
  - triage
body:
  - type: input
    id: os_version
    attributes:
      label: OS version
      description: Name the operating system and version tested.
      placeholder: Windows 98 SE, Windows XP SP3, Windows 11 24H2, or similar
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x86
        - x64
        - mixed or unknown
    validations:
      required: true
  - type: input
    id: renderer_mode
    attributes:
      label: Renderer mode if relevant
      description: Note GDI, GL11, gl_plus, not applicable, or unknown.
      placeholder: GDI, GL11, not applicable, or unknown
  - type: textarea
    id: hardware_driver_notes
    attributes:
      label: Hardware and driver notes
      description: Include GPU, display adapter, VM notes, or driver details if relevant.
  - type: input
    id: product_or_area
    attributes:
      label: Product, saver, or repo area
      description: Name the affected saver, app, script, or repository area.
      placeholder: products/savers/nocturne, tools/scripts/check_docs_basics.py, or similar
    validations:
      required: true
  - type: dropdown
    id: result_classification
    attributes:
      label: Result classification
      options:
        - works
        - works with issues
        - fails
    validations:
      required: true
  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - always
        - intermittent
        - only observed once
        - unknown
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Describe what was tested, what happened, and any limitations.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link or name screenshots, captures, logs, or validation notes if available.
